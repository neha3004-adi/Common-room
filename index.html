<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gryffindor Common Room Engine</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        /* All your styles remain the same, keeping them brief here for clarity */
        :root { --gold: #FFD700; --scarlet: #740001; }
        body { background: #141414; color: #F4EAD4; font-family: Georgia, serif; }
        .container { max-width: 650px; margin: 30px auto; border: 3px double var(--gold); padding: 25px; background: #0f0a08; border-radius: 12px; }
        .page { display: none; } .active { display: block; }
        button.action-btn { background: var(--scarlet); color: #F4EAD4; border: 1px solid var(--gold); padding: 12px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div id="page-login" class="page active">
        <h1 style="text-align: center; color: var(--gold);">⚡ Welcome to Hogwarts ⚡</h1>
        <button class="action-btn" onclick="loginAdi()" style="width: 100%;">Enter Common Room</button>
    </div>
    <!-- Other pages would follow here -->
</div>

<script>
    // 1. CONFIGURATION
    const firebaseConfig = {
        apiKey: "AIzaSyBXE-12Q8pM6_sTyfhYmMAiNhXgJV_R7Ck",
        authDomain: "adi-day-planner.firebaseapp.com",
        projectId: "adi-day-planner",
        storageBucket: "adi-day-planner.firebasestorage.app",
        messagingSenderId: "582460179914",
        appId: "1:582460179914:web:53a7eae94028fdebf9bb33"
    };

    // 2. INITIALIZATION
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("house_engine").doc("master_state");

    let appData = { coins: 0, streak: 0, lastLoginNumericalKey: 0, tasks: [] };

    docRef.onSnapshot((doc) => {
        if (doc.exists()) {
            appData = doc.data();
        } else {
            docRef.set(appData);
        }
    });

    // 3. LOGIN LOGIC
    function loginAdi() {
        console.log("Login button clicked!");
        // Simplified login for testing
        navigateTo('page-hub');
    }

    function navigateTo(p) {
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.getElementById(p).classList.add('active');
    }
</script>
</body>
</html>
