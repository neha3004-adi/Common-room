<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gryffindor Common Room Engine</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #FFD700; --scarlet: #740001; --parchment: #F4EAD4; --charcoal: #141414; }
        body { font-family: 'Georgia', serif; background-color: var(--charcoal); color: var(--parchment); padding: 20px; margin: 0; min-height: 100vh; }
        .container { max-width: 650px; margin: 30px auto; border: 3px double var(--gold); padding: 25px; background: rgba(15, 10, 8, 0.95); border-radius: 12px; }
        .page { display: none; } .active { display: block; }
        .menu-tab { border: 2px solid #3a2a1d; padding: 18px; background: #1e1711; margin-bottom: 10px; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .menu-tab:hover { border-color: var(--gold); color: var(--gold); }
        .action-btn { background: var(--scarlet); color: white; border: 1px solid var(--gold); padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="master-summary-hud" class="summary-hud" style="display: none; background: var(--scarlet); padding: 15px; margin-bottom: 20px; border-radius: 8px;">
        <h3>⚡ Gryffindor Common Room ⚡</h3>
        <p>Streak: <span id="hud-streak">0</span> | Galleons: <span id="hud-coins">0</span></p>
    </div>

    <!-- Login Page -->
    <div id="page-login" class="page active">
        <h1>Welcome to Hogwarts</h1>
        <button class="action-btn" onclick="loginAdi()">Enter Common Room</button>
    </div>

    <!-- Hub Page -->
    <div id="page-hub" class="page">
        <div class="menu-tab" onclick="navigateTo('page-challenges')">🎯 Today's Challenges</div>
        <div class="menu-tab" onclick="navigateTo('page-quests')">🏆 Weekly Quests</div>
        <div class="menu-tab" onclick="navigateTo('page-vocabulary')">📖 Spellbook</div>
        <div class="menu-tab" onclick="navigateTo('page-analytics')">📊 Weekly Analytics</div>
        <div class="menu-tab" onclick="navigateTo('page-rewards')">📦 Treasure Chest</div>
    </div>

    <!-- Feature Pages -->
    <div id="page-challenges" class="page"><h2>🎯 Challenges</h2><button class="action-btn" onclick="navigateTo('page-hub')">Return</button></div>
    <div id="page-quests" class="page"><h2>🏆 Weekly Quests</h2><button class="action-btn" onclick="navigateTo('page-hub')">Return</button></div>
    <div id="page-vocabulary" class="page"><h2>📖 Spellbook</h2><button class="action-btn" onclick="navigateTo('page-hub')">Return</button></div>
    <div id="page-analytics" class="page"><h2>📊 Analytics</h2><button class="action-btn" onclick="navigateTo('page-hub')">Return</button></div>
    <div id="page-rewards" class="page"><h2>📦 Treasure Chest</h2><button class="action-btn" onclick="navigateTo('page-hub')">Return</button></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBXE-12Q8pM6_sTyfhYmMAiNhXgJV_R7Ck",
        authDomain: "adi-day-planner.firebaseapp.com",
        projectId: "adi-day-planner",
        storageBucket: "adi-day-planner.firebasestorage.app",
        messagingSenderId: "582460179914",
        appId: "1:582460179914:web:53a7eae94028fdebf9bb33"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("house_engine").doc("master_state");

    let appData = { coins: 0, streak: 0, lastLoginNumericalKey: 0, tasks: [], vocabulary: [] };

    docRef.onSnapshot((doc) => {
        if (doc.exists()) { appData = doc.data(); updateUI(); }
    });

    function navigateTo(p) {
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('master-summary-hud').style.display = (p === 'page-login') ? 'none' : 'block';
    }

    function loginAdi() {
        appData.streak++;
        docRef.set(appData);
        navigateTo('page-hub');
    }

    function updateUI() {
        document.getElementById('hud-streak').innerText = appData.streak || 0;
        document.getElementById('hud-coins').innerText = appData.coins || 0;
    }
</script>
</body>
</html>
