<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gryffindor Common Room Engine</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #FFD700; --scarlet: #740001; --parchment: #F4EAD4; --charcoal: #141414; }
        body { font-family: 'Georgia', serif; background-color: var(--charcoal); color: var(--parchment); padding: 20px; }
        .container { max-width: 650px; margin: 30px auto; border: 3px double var(--gold); padding: 25px; background: #000; border-radius: 12px; }
        .page { display: none; } .active { display: block; }
        .menu-tab { border: 2px solid #3a2a1d; padding: 18px; background: #1e1711; margin-bottom: 10px; cursor: pointer; }
        .action-btn { background: var(--scarlet); color: white; border: 1px solid var(--gold); padding: 12px; width: 100%; margin-top: 10px; cursor: pointer; }
        #master-summary-hud { border: 2px solid var(--gold); padding: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="master-summary-hud" style="display:none;">
        <h3>⚡ Gryffindor Common Room ⚡</h3>
        <p>Streak: <span id="hud-streak">0</span> | Galleons: <span id="hud-coins">0</span></p>
        <canvas id="clock" width="50" height="50"></canvas>
    </div>

    <div id="page-login" class="page active">
        <h1>Welcome to Hogwarts</h1>
        <p>"I solemnly swear that I am up to no good."</p>
        <img src="harry on broom.png" width="100">
        <button class="action-btn" onclick="loginAdi()">Enter</button>
    </div>

    <div id="page-hub" class="page">
        <div class="menu-tab" onclick="navigateTo('page-challenges')">🎯 Today's Challenges</div>
        <div class="menu-tab" onclick="navigateTo('page-quests')">🏆 Weekly Quests</div>
        <div class="menu-tab" onclick="navigateTo('page-vocabulary')">📖 Spellbook</div>
        <div class="menu-tab" onclick="navigateTo('page-analytics')">📊 Analytics</div>
        <div class="menu-tab" onclick="navigateTo('page-rewards')">📦 Treasure Chest</div>
    </div>

    <div id="page-challenges" class="page"><h2>Challenges</h2><div id="task-list"></div><button onclick="navigateTo('page-hub')">Return</button></div>
    <div id="page-quests" class="page"><h2>Quests</h2><button onclick="navigateTo('page-hub')">Return</button></div>
    <div id="page-vocabulary" class="page"><h2>Spellbook</h2><input id="v-input"><button onclick="addVocab()">Add</button><div id="v-list"></div><button onclick="navigateTo('page-hub')">Return</button></div>
    <div id="page-analytics" class="page"><h2>Analytics</h2><button onclick="navigateTo('page-hub')">Return</button></div>
    <div id="page-rewards" class="page"><h2>Rewards</h2><button onclick="navigateTo('page-hub')">Return</button></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBXE-12Q8pM6_sTyfhYmMAiNhXgJV_R7Ck", authDomain: "adi-day-planner.firebaseapp.com", projectId: "adi-day-planner", storageBucket: "adi-day-planner.firebasestorage.app", messagingSenderId: "582460179914", appId: "1:582460179914:web:53a7eae94028fdebf9bb33" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let appData = { coins: 0, streak: 0, tasks: [], vocabulary: [] };

    db.collection("house_engine").doc("master_state").onSnapshot(doc => {
        if(doc.exists) { appData = doc.data(); updateUI(); }
    });

    function navigateTo(p) {
        document.querySelectorAll('.page').forEach(e => e.classList.remove('active'));
        document.getElementById(p).classList.add('active');
        document.getElementById('master-summary-hud').style.display = (p === 'page-login') ? 'none' : 'block';
    }

    function loginAdi() {
        appData.streak++;
        db.collection("house_engine").doc("master_state").set(appData);
        navigateTo('page-hub');
    }

    function updateUI() {
        document.getElementById('hud-streak').innerText = appData.streak;
        document.getElementById('hud-coins').innerText = appData.coins;
        renderTasks(); renderVocab();
    }

    function renderTasks() {
        const list = document.getElementById('task-list');
        list.innerHTML = appData.tasks.map(t => `<div>${t.text}</div>`).join('');
    }

    function addVocab() {
        const val = document.getElementById('v-input').value;
        appData.vocabulary.push(val);
        db.collection("house_engine").doc("master_state").set(appData);
    }

    function renderVocab() {
        const list = document.getElementById('v-list');
        list.innerHTML = appData.vocabulary.map(v => `<div>${v}</div>`).join('');
    }
</script>
</body>
</html>
